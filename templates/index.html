<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - 智能运维管理平台</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ range(1, 10000) | random }}">
</head>
<body>
    <div id="nexus-app">
        <!-- 侧边窄导航 -->
        <nav class="side-nav">
            <div class="nav-top">
                <div class="nav-item active" title="运维资产" data-module="ops">
                    <i data-lucide="server"></i>
                </div>
                <div class="nav-item" title="自动化任务" data-module="check">
                    <i data-lucide="activity"></i>
                </div>
                <div class="nav-item" title="脚本库" data-module="scripts">
                    <i data-lucide="code"></i>
                </div>
                <div class="nav-item" title="性能监控" data-module="monitor">
                    <i data-lucide="line-chart"></i>
                </div>
                <div class="nav-item" title="知识中心" data-module="kb">
                    <i data-lucide="book-open"></i>
                </div>
            </div>
            <div class="nav-bottom">
                <div class="nav-item" title="设置" data-module="settings">
                    <i data-lucide="settings"></i>
                </div>
            </div>
        </nav>

        <!-- 左侧功能面板 (资源树) -->
        <aside class="explorer-panel">
            <div class="panel-header">
                <h3 id="sidebar-title">运维资产</h3>
                <button id="add-server-btn" class="icon-button" title="添加服务器">
                    <i data-lucide="plus-square"></i>
                </button>
            </div>
            <div class="panel-content" id="sidebar-content">
                <div style="padding: 20px; color: #636d83; font-style: italic;">加载中...</div>
            </div>
        </aside>
        <div class="v-resizer left-v-resizer"></div>

        <!-- 主舞台区 -->
        <main class="main-stage">
            <header class="stage-tabs" id="tab-bar"></header>
            <section class="stage-content" id="main-content">
                <!-- 欢迎界面，当没有标签页时显示 -->
                <div class="welcome-screen" id="welcome-screen">
                    <div class="nexus-hero">
                        <div class="hero-logo-container">
                            <i data-lucide="terminal" class="hero-icon"></i>
                            <span class="terminal-cursor">_</span>
                        </div>
                        <h1>NEXUS</h1>
                        <p class="hero-subtitle">智能 AI 驱动的一站式运维管理平台</p>
                    </div>
                    <div class="shortcuts-card">
                        <div class="shortcuts-grid">
                            <div class="shortcut-item">
                                <div class="shortcut-info">
                                    <i data-lucide="plus-circle" style="width:14px; color:var(--accent-blue)"></i>
                                    <span>添加服务器</span>
                                </div>
                                <div class="shortcut-keys">
                                    <kbd>CTRL</kbd> + <kbd>N</kbd>
                                </div>
                            </div>
                            <div class="shortcut-item">
                                <div class="shortcut-info">
                                    <i data-lucide="layers" style="width:14px; color:var(--accent-blue)"></i>
                                    <span>切换标签页</span>
                                </div>
                                <div class="shortcut-keys">
                                    <kbd>CTRL</kbd> + <kbd>TAB</kbd>
                                </div>
                            </div>
                            <div class="shortcut-item">
                                <div class="shortcut-info">
                                    <i data-lucide="maximize" style="width:14px; color:var(--accent-blue)"></i>
                                    <span>全屏终端</span>
                                </div>
                                <div class="shortcut-keys">
                                    <kbd>F11</kbd>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <div class="v-resizer right-v-resizer"></div>
        <aside class="ai-side-panel">
            <div class="ai-header">
                <span><i data-lucide="sparkles"></i> AI ASSISTANT</span>
                <div class="ai-header-tools">
                    <button class="icon-button" id="close-ai-panel" title="关闭助手">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>
            <div class="chat-container">
                <div class="chat-messages" id="chat-messages">
                    <div class="message ai">
                        <div class="message-avatar"><i data-lucide="bot"></i></div>
                        <div class="bubble">欢迎回来！我是您的 Nexus 智能运维助手，有什么我可以帮您的吗？</div>
                    </div>
                </div>
                <div class="chat-input-area">
                    <div class="input-wrapper">
                        <textarea placeholder="输入指令或咨询运维问题..." id="chat-input" rows="1"></textarea>
                        <div class="input-actions">
                            <div class="input-tool-group">
                                <select class="model-mini-select" id="ai-model-selector">
                                    <option value="">OpenAI (Default)</option>
                                </select>
                                <button class="icon-button" id="capture-terminal" title="获取当前终端内容给 AI 分析" style="width:34px; height:34px; margin-left:8px; opacity:0.8; background:rgba(255,255,255,0.03); border:1px solid var(--border-glass); border-radius:8px; color:var(--text-bright); cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s">
                                    <i data-lucide="terminal" style="width:18px"></i>
                                </button>
                            </div>
                            <button class="send-btn" id="send-chat" title="发送 (Enter)">
                                <i data-lucide="arrow-up"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- 状态栏 (V18 回归版：彻底消除分裂感) -->
        <footer class="status-bar">
            <div class="status-left">
                <div class="status-item"><i data-lucide="check-circle" style="width:10px; color:var(--accent-green)"></i> 准备就绪</div>
                <div class="status-item" id="status-server-name">无活动会话</div>
            </div>
            <div class="status-right">
                <div class="status-item">UTF-8</div>
                <div class="status-item">Terminal: xterm</div>
                <div class="status-item">Nexus v1.0.0</div>
            </div>
        </footer>
        <div class="toast-container" id="toast-container"></div>
    </div>

    <!-- 弹窗与悬浮组件 (移出 Grid 容器以消除布局间隙) -->
    
    <!-- AI 悬浮入口 -->
    <div class="ai-toggle-fab" id="ai-fab" title="开启 AI 助手">
        <i data-lucide="sparkles"></i>
    </div>

    <!-- 管理弹窗 -->
    <div class="modal" id="server-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>管理服务器</h3>
                <div class="modal-header-tools">
                    <button class="icon-button" onclick="document.getElementById('server-modal').classList.remove('open')" title="关闭窗口">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>
            <form id="server-form">
                <div class="modal-body">
                    <input type="hidden" id="s-id">
                    
                    <div class="form-group">
                        <label>服务器名称</label>
                        <div class="input-icon-wrapper">
                            <i data-lucide="tag"></i>
                            <input type="text" id="s-name" placeholder="例如: Production-Web-01">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>IP 地址</label>
                            <div class="input-icon-wrapper">
                                <i data-lucide="globe"></i>
                                <input type="text" id="s-ip" placeholder="127.0.0.1">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>SSH 端口</label>
                            <div class="input-icon-wrapper">
                                <i data-lucide="hash"></i>
                                <input type="number" id="s-port" value="22">
                            </div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>登录用户</label>
                            <div class="input-icon-wrapper">
                                <i data-lucide="user"></i>
                                <input type="text" id="s-user" value="root">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>资源分组</label>
                            <div class="input-icon-wrapper">
                                <i data-lucide="folder"></i>
                                <input type="text" id="s-group" placeholder="默认分组">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>SSH 密码 / 私钥口令</label>
                        <div class="input-icon-wrapper">
                            <i data-lucide="key-round"></i>
                            <input type="password" id="s-pass" placeholder="••••••••">
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn-cancel" onclick="document.getElementById('server-modal').classList.remove('open')">取消</button>
                    <button type="button" id="save-server" class="btn-confirm">保存配置</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 文件编辑器弹窗 -->
    <div class="modal" id="editor-modal">
        <div class="modal-content editor-modal-content">
            <div class="modal-header">
                <h3>编辑: <span id="editor-filename"></span></h3>
                <div class="modal-header-tools">
                    <button id="save-file-btn" class="btn-confirm">保存并同步</button>
                    <button class="icon-button" onclick="document.getElementById('editor-modal').classList.remove('open')" title="关闭编辑">
                        <i data-lucide="x"></i>
                    </button>
                </div>
            </div>
            <div class="modal-body editor-body">
                <div id="ace-editor-container" style="width:100%; height:100%"></div>
            </div>
        </div>
    </div>

    <!-- 监控控制台容器 -->
    <div id="stats-panel-container"></div>

    <!-- 模型配置弹窗 (Model Modal) -->
    <div id="model-config-modal" class="modal-overlay" style="display:none; align-items:center; justify-content:center; position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; background:rgba(0,0,0,0.6)">
        <div class="modal-content" style="width:450px; background:var(--bg-panel); border-radius:12px; border:1px solid var(--border-color); overflow:hidden">
            <div class="modal-header">
                <h3 id="model-modal-title">AI 引擎配置</h3>
                <i data-lucide="x" class="close-modal" id="close-model-modal"></i>
            </div>
            <div class="modal-body" style="padding:20px">
                <input type="hidden" id="modal-ai-id">
                <div class="form-group" style="margin-bottom:15px">
                    <label>显示名称</label>
                    <input type="text" id="modal-ai-name" placeholder="例如: My GPT-4" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-bright); border-radius:6px">
                </div>
                <div class="form-group" style="margin-bottom:15px">
                    <label>模型提供商</label>
                    <select id="modal-ai-provider" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-bright); border-radius:6px">
                        <option value="openai">OpenAI API</option>
                        <option value="ollama">Ollama (Local)</option>
                        <option value="local">Mock (Local)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:15px">
                    <label>API Endpoint</label>
                    <input type="text" id="modal-ai-url" placeholder="https://api.openai.com/v1" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-bright); border-radius:6px">
                </div>
                <div class="form-group" style="margin-bottom:15px">
                    <label>API Key</label>
                    <input type="password" id="modal-ai-key" placeholder="sk-..." style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-bright); border-radius:6px">
                </div>
                <div class="form-group" style="margin-bottom:20px">
                    <label>模型 Model ID</label>
                    <input type="text" id="modal-ai-model" placeholder="gpt-4 / llama3" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-bright); border-radius:6px">
                </div>
                
                <div style="display:flex; justify-content:flex-end; gap:12px">
                    <button class="btn-cancel" id="cancel-model-btn" style="padding:8px 20px; border-radius:6px; border:1px solid var(--border-color); background:transparent; color:var(--text-main); cursor:pointer">取消</button>
                    <button class="btn-confirm" id="save-modal-model-btn" style="padding:8px 20px; border-radius:6px; border:none; background:var(--accent-blue); color:white; cursor:pointer">保存配置</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 脚本配置弹窗 (Script Modal) -->
    <div id="script-config-modal" class="modal-overlay" style="display:none; align-items:center; justify-content:center; position:fixed; top:0; left:0; width:100%; height:100%; z-index:2000; background:rgba(0,0,0,0.6)">
        <div class="modal-content" style="width:500px; background:var(--bg-panel); border-radius:12px; border:1px solid var(--border-color); overflow:hidden">
            <div class="modal-header">
                <h3 id="script-modal-title">脚本配置</h3>
                <i data-lucide="x" class="close-modal" id="close-script-modal"></i>
            </div>
            <div class="modal-body" style="padding:20px">
                <input type="hidden" id="modal-script-id">
                <div class="form-group" style="margin-bottom:15px">
                    <label>脚本名称</label>
                    <input type="text" id="modal-script-name" placeholder="例如: Check Disk Usage" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-bright); border-radius:6px">
                </div>
                <div class="form-group" style="margin-bottom:15px">
                    <label>脚本类型</label>
                    <select id="modal-script-type" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-bright); border-radius:6px">
                        <option value="shell">Shell (.sh)</option>
                        <option value="python">Python (.py)</option>
                    </select>
                </div>
                <div class="form-group" style="margin-bottom:15px">
                    <label>脚本内容</label>
                    <textarea id="modal-script-content" placeholder="#!/bin/bash..." style="width:100%; height:120px; padding:10px; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-bright); border-radius:6px; font-family:var(--font-mono)"></textarea>
                </div>
                <div class="form-group" style="margin-bottom:20px">
                    <label>描述</label>
                    <input type="text" id="modal-script-desc" placeholder="简述脚本用途" style="width:100%; padding:10px; background:var(--bg-input); border:1px solid var(--border-color); color:var(--text-bright); border-radius:6px">
                </div>
                
                <div style="display:flex; justify-content:flex-end; gap:12px">
                    <button class="btn-cancel" id="cancel-script-btn" style="padding:8px 20px; border-radius:6px; border:1px solid var(--border-color); background:transparent; color:var(--text-main); cursor:pointer">取消</button>
                    <button class="btn-confirm" id="save-script-modal-btn" style="padding:8px 20px; border-radius:6px; border:none; background:var(--accent-blue); color:white; cursor:pointer">保存脚本</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.2/dist/socket.io.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ace/1.31.2/ace.js"></script>
    <!-- Markdown Rendering Support -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}?v={{ range(1, 10000) | random }}"></script>
</body>
</html>
